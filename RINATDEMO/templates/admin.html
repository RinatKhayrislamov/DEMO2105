{% extends "base.html" %}
{% block content %}
<h2>Панель администратора (Заявки)</h2><hr>
<div class="row mb-4">
    <div class="col-md-12">
        <form method="GET" class="row g-3 align-items-end">
            <div class="col-auto">
                <label class="form-label">Фильтр по статусу:</label>
                <select name="status" class="form-select">
                    <option value="">Все</option>
                    <option value="Новая" {% if current_status == 'Новая' %}selected{% endif %}>Новая</option>
                    <option value="Идёт обучение" {% if current_status == 'Идёт обучение' %}selected{% endif %}>Идёт обучение</option>
                    <option value="Обучение завершено" {% if current_status == 'Обучение завершено' %}selected{% endif %}>Обучение завершено</option>
                    <option value="Отклонено" {% if current_status == 'Отклонено' %}selected{% endif %}>Отклонено</option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label">Сортировка:</label>
                <select name="sort" class="form-select">
                    <option value="created_at">По дате</option>
                    <option value="status">По статусу</option>
                </select>
            </div>
            <div class="col-auto"><button type="submit" class="btn btn-primary">Применить</button></div>
        </form>
    </div>
</div>
<div class="table-responsive">
    <table class="table table-hover bg-white rounded shadow-sm">
        <thead><tr><th>ID</th><th>Пользователь</th><th>Тема</th><th>Дата</th><th>Статус</th><th>Действия</th></tr></thead>
        <tbody>
            {% for req in requests %}
            <tr>
                <td>{{ req.id }}</td><td>{{ req.user.username }}</td><td>{{ req.title }}</td><td>{{ req.created_at.strftime('%d.%m.%Y') }}</td>
                <td><span class="badge {% if req.status == 'Новая' %}bg-secondary{% elif req.status == 'В работе' %}bg-primary{% elif req.status == 'Завершено' %}bg-success{% else %}bg-danger{% endif %}">{{ req.status }}</span></td>
                <td>
                    <form method="POST" action="{{ url_for('update_status', req_id=req.id) }}" class="d-flex gap-2">
                        <select name="status" class="form-select form-select-sm" style="width: 150px;">
                            <option value="Новая" {% if req.status == 'Новая' %}selected{% endif %}>Новая</option>
                            <option value="Идёт обучение" {% if req.status == 'Идёт обучение' %}selected{% endif %}>Идёт обучение</option>
                            <option value="Обучение завершено" {% if req.status == 'Обучение завершено' %}selected{% endif %}>Обучение завершено</option>
                            <option value="Отклонено" {% if req.status == 'Отклонено' %}selected{% endif %}>Отклонено</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-outline-primary">OK</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
